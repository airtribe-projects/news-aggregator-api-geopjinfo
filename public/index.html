<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Aggregator API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .badge {
      display: inline-block;
      background: #0ea5e9;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }

    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    a.btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a.btn:hover { opacity: 0.85; }

    a.btn-primary { background: #0ea5e9; color: #fff; }
    a.btn-secondary { background: #334155; color: #e2e8f0; }

    .endpoints {
      margin-top: 2rem;
      text-align: left;
      border-top: 1px solid #334155;
      padding-top: 1.5rem;
    }

    .endpoints h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    .endpoint {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0;
      font-size: 0.82rem;
      color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }

    .method {
      font-weight: 700;
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      min-width: 3.2rem;
      text-align: center;
    }

    .get    { background: #064e3b; color: #34d399; }
    .post   { background: #1e3a5f; color: #60a5fa; }
    .put    { background: #451a03; color: #fb923c; }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">REST API &mdash; v1.0.0</span>
    <h1>News Aggregator</h1>
    <p>A personalized news aggregation service. Fetch top headlines and search articles based on your preferences, and track what you've read or saved.</p>

    <div class="links">
      <a class="btn btn-primary" href="/api/docs">Interactive API Docs (Swagger UI)</a>
      <a class="btn btn-secondary" href="/api/docs.json">OpenAPI Spec (JSON)</a>
      <a class="btn btn-secondary" href="/health">Health Check</a>
    </div>

  <footer>News Aggregator REST API</footer>
</body>
</html>
